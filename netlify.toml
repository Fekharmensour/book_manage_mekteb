[build]
  command = "pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/book-fair run build"
  publish = "artifacts/book-fair/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_FLAGS = "--no-frozen-lockfile"
  NPM_FLAGS = "--no-frozen-lockfile"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
