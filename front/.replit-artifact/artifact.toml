kind = "web"
previewPath = "/"
title = "Book Fair POS"
version = "1.0.0"
id = "artifacts/book-fair"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24282

[services.development]
run = "pnpm --filter @workspace/book-fair run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/book-fair", "run", "build" ]
publicDir = "artifacts/book-fair/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24282"
BASE_PATH = "/"
